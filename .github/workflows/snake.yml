name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: vitoriediezc
          outputs: |
            dist/github-contribution-grid-snake.svg

      - name: Push to output branch
        uses: EndBug/add-and-commit@v9
        with:
          add: "dist"
          message: "generate snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
