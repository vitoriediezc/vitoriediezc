name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: vitoriediezc
          outputs: dist/github-contribution-grid-snake.svg

      - name: Commit files
        uses: EndBug/add-and-commit@v9
        with:
          add: "dist"
          message: "update snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
